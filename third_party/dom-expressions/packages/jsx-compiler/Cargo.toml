[package]
name = "dom-expressions-jsx-compiler"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
html5ever = "0.39.0"
htmlize = { version = "1", features = ["unescape"] }
markup5ever_rcdom = "0.39.0"
napi = { version = "3.8", default-features = false, features = ["napi4"] }
napi-derive = "3.5"
oxc_allocator = "0.118"
oxc_ast = "0.118"
oxc_ast_visit = "0.118"
oxc_codegen = "0.118"
oxc_parser = "0.118"
oxc_span = "0.118"
oxc_syntax = "0.118"

[build-dependencies]
napi-build = "2.2"

