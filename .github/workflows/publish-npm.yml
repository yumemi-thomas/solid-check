name: Publish npm package

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-15
            platform: darwin
            arch: arm64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: windows-2025
            platform: win32
            arch: x64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@1.97
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build native package
        env:
          SOLID_CHECK_BUILD_ID: ${{ github.ref_name }}
        run: |
          extension=""
          if [[ "${{ matrix.platform }}" == "win32" ]]; then extension=".exe"; fi
          mkdir -p bin
          go build -ldflags "-X main.buildID=$SOLID_CHECK_BUILD_ID" \
            -o "bin/solid-typefacts${extension}" ./cmd/solid-typefacts
          cargo build --release --manifest-path rust/Cargo.toml --workspace
          node scripts/package-rust.mjs \
            --output "dist/${{ matrix.platform }}-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --version "${GITHUB_REF_NAME#v}" \
            --typefacts "bin/solid-typefacts${extension}"
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

  wasm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97
        with:
          targets: wasm32-wasip1-threads
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/wasm/package-lock.json
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: npm ci
        working-directory: packages/wasm
      - name: Build WASI package
        working-directory: packages/wasm
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          npm run build
          npm test
          npm pack --dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: |
            packages/wasm/package.json
            packages/wasm/README.md
            packages/wasm/index.d.ts
            packages/wasm/node.cjs
            packages/wasm/browser-entry.js
            packages/wasm/solid-check-wasm.wasi.cjs
            packages/wasm/solid-check-wasm.wasi-browser.js
            packages/wasm/solid-check-wasm.wasm32-wasi.wasm
            packages/wasm/wasi-worker.mjs
            packages/wasm/wasi-worker-browser.mjs
          if-no-files-found: error

  publish:
    needs: [build, wasm]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install Trusted Publishing-compatible npm
        run: npm install --global "npm@^11.15.0"
      - uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: dist/artifacts
      - uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: dist/wasm
      - name: Assemble and validate package
        run: |
          version="${GITHUB_REF_NAME#v}"
          for target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            mv "dist/artifacts/npm-${target}" "dist/artifacts/${target}"
          done
          node scripts/assemble-npm-package.mjs dist/artifacts dist/packages "$version"
          for package in dist/packages/*; do npm pack "$package" --dry-run; done
      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for package in dist/packages/binding-*; do
            npm publish "$package"
          done
      - name: Publish WASM package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./dist/wasm
      - name: Publish portable package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./dist/packages/solid-checker
