name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  typefacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./cmd/solid-typefacts ./internal/typefacts/... ./internal/wirecbor
      - run: go vet ./cmd/solid-typefacts ./internal/typefacts/... ./internal/wirecbor
      - run: test -z "$(gofmt -l cmd/solid-typefacts internal/typefacts internal/wirecbor)"

  compiler-facts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/dom-expressions/packages/jsx-compiler
      - run: cargo fmt --manifest-path third_party/dom-expressions/packages/jsx-compiler/Cargo.toml -- --check
      - run: >-
          cargo clippy
          --manifest-path third_party/dom-expressions/packages/jsx-compiler/Cargo.toml
          --no-default-features --features sidecar --all-targets
      - run: >-
          cargo test
          --manifest-path third_party/dom-expressions/packages/jsx-compiler/Cargo.toml
          --no-default-features --features sidecar

  rust-engine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@1.97
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            third_party/dom-expressions/packages/jsx-compiler
      - run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --workspace --all-targets
      - run: make test-rust

  rust-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-15
            platform: darwin
            arch: arm64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: windows-2025
            platform: win32
            arch: x64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: dtolnay/rust-toolchain@1.97
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build one-version native package
        env:
          SOLID_CHECK_BUILD_ID: ci-${{ github.sha }}
        run: |
          extension=""
          if [[ "${{ matrix.platform }}" == "win32" ]]; then extension=".exe"; fi
          mkdir -p bin
          go build -ldflags "-X main.buildID=$SOLID_CHECK_BUILD_ID" -o "bin/solid-typefacts${extension}" ./cmd/solid-typefacts
          cargo build --release --manifest-path rust/Cargo.toml --workspace
          node scripts/package-rust.mjs \
            --output dist/solid-check \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --typefacts "bin/solid-typefacts${extension}"
      - name: Smoke-test installed CLI and LSP
        run: |
          extension=""
          if [[ "${{ matrix.platform }}" == "win32" ]]; then extension=".exe"; fi
          native="dist/solid-check/native/${{ matrix.platform }}-${{ matrix.arch }}"
          env -u SOLID_TYPEFACTS_BIN "$native/solid-check${extension}" \
            --certify --project internal/reactiveir/testdata/tracer-corrected/tsconfig.json
          env -u SOLID_TYPEFACTS_BIN node scripts/lsp-smoke.mjs \
            "$native/solid-checkd${extension}" \
            internal/reactiveir/testdata/tracer/tsconfig.json
          npm pack ./dist/solid-check --dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: solid-check-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/solid-check

  wasm-package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97
        with:
          targets: wasm32-wasip1-threads
      - run: rustup target add wasm32-wasip1-threads --toolchain 1.97
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/wasm/package-lock.json
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: npm ci
        working-directory: packages/wasm
      - run: npm run build
        working-directory: packages/wasm
      - run: npm test
        working-directory: packages/wasm
      - run: npm pack --dry-run
        working-directory: packages/wasm

  compiler-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: third_party/dom-expressions/pnpm-lock.yaml
      - run: make conformance

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh -n scripts/*.sh
      - run: node --test scripts/*.test.mjs
      - run: jq empty schema/*.json pkg/contracts/bundled/*.json
