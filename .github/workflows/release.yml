name: 'Release'

# Publishes the main packages to npm via changesets, authenticated with OIDC
# trusted publishing (no tokens, no OTP). Each of the five main packages must
# have this repo + this workflow file (release.yml) configured as its Trusted
# Publisher on npmjs.com.
#
# Release order matters: run the "JSX Compiler Binaries" workflow with
# publish: true FIRST so the platform binary packages exist at the new
# version — @dom-expressions/jsx-compiler pins them as optionalDependencies.
# The preflight step below enforces this.

# The push trigger exists only to register the workflow with GitHub (the
# default branch has no workflows dir, and dispatch-only workflows off the
# default branch never register). The publish job is gated to dispatch runs.
on:
  workflow_dispatch:
  push:
    branches:
      - next
    paths:
      - '.github/workflows/release.yml'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: publish main packages
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push git tags created by changeset publish
      id-token: write # npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Preflight — platform binary packages must already be published
        run: |
          version=$(node -p "require('./packages/jsx-compiler/package.json').version")
          echo "Checking platform packages at $version"
          missing=0
          for pkg in darwin-x64 darwin-arm64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            if npm view "@dom-expressions/jsx-compiler-$pkg@$version" version >/dev/null 2>&1; then
              echo "ok      @dom-expressions/jsx-compiler-$pkg@$version"
            else
              echo "MISSING @dom-expressions/jsx-compiler-$pkg@$version"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo ""
            echo "Run the 'JSX Compiler Binaries' workflow with publish: true first."
            exit 1
          fi

      # jsx-compiler is excluded: its main package ships no build artifacts
      # (binaries live in the platform packages), so no Rust build is needed.
      - name: Build packages
        run: pnpm --filter '!@dom-expressions/jsx-compiler' -r run build

      - name: Publish to npm
        run: pnpm exec changeset publish

      - name: Push git tags
        run: git push origin --tags
